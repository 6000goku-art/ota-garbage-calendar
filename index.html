<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太田市 ごみ収集案内</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 公式サイト風の落ち着いたフォント設定 */
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    </style>
</head>
<body class="bg-emerald-50/50 min-h-screen p-4 flex flex-col items-center">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg border-t-4 border-emerald-600 p-6 mt-4">
        <h1 class="text-2xl font-extrabold text-center text-emerald-800 mb-1 tracking-tight">太田市 ごみ収集案内</h1>
        <p class="text-xs text-center text-emerald-600/70 mb-6 font-medium">エリアと町名を選ぶと予定を表示します</p>

        <div class="space-y-4 mb-6">
            <select id="areaSelect" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow">
                <option value="">-- 1. エリアを選択 --</option>
                <!-- 動的に生成されます -->
            </select>
            <select id="townSelect" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow hidden">
                <option value="">-- 2. 町名を選択 --</option>
            </select>
        </div>

        <div id="loading" class="text-center text-sm font-bold text-emerald-600 py-6 animate-pulse">最新の町名データを読み込み中...</div>

        <div id="resultArea" class="hidden">
            <div class="border-b-2 border-emerald-600 pb-3 mb-4">
                <div class="flex justify-between items-center mb-3">
                    <h2 id="townTitle" class="text-lg font-bold text-emerald-800">町名</h2>
                    <a id="pdfLink" href="#" target="_blank" rel="noopener noreferrer" class="text-xs text-emerald-600 underline hover:text-emerald-800 hidden flex items-center">
                        <span class="mr-1">🔗</span>元のPDFで確認
                    </a>
                </div>
                
                <!-- 表示切り替えトグル -->
                <div class="flex bg-gray-100 p-1 rounded-lg w-full">
                    <button id="btn1Week" class="flex-1 px-3 py-1.5 text-sm font-bold rounded-md bg-white text-emerald-700 shadow-sm transition-all duration-200">1週間分</button>
                    <button id="btn1Month" class="flex-1 px-3 py-1.5 text-sm font-bold rounded-md text-gray-500 hover:text-gray-800 transition-all duration-200">1か月分</button>
                </div>
            </div>
            
            <div id="scheduleList" class="space-y-0"></div>
        </div>
    </div>

    <script>
        let AREA_TOWN_MAP = {};

        const GARBAGE_ICONS = {
            "M": { name: "燃えるゴミ", icon: "🔥", color: "text-red-500" },
            "N": { name: "燃えないゴミ", icon: "🗑️", color: "text-gray-600" },
            "S": { name: "資源ゴミ", icon: "♻️", color: "text-blue-500" },
            "P": { name: "プラ容器包装", icon: "🍱", color: "text-yellow-600" },
            "R": { name: "ペットボトル", icon: "🧴", color: "text-cyan-500" },
            "K": { name: "危険ごみ", icon: "⚠️", color: "text-orange-500" },
            "B": { name: "ビン", icon: "🍾", color: "text-green-600" },
            "C": { name: "カン", icon: "🥫", color: "text-indigo-500" }
        };

        const areaSelect = document.getElementById('areaSelect');
        const townSelect = document.getElementById('townSelect');
        const resultArea = document.getElementById('resultArea');
        const scheduleList = document.getElementById('scheduleList');
        const townTitle = document.getElementById('townTitle');
        const loading = document.getElementById('loading');
        const pdfLink = document.getElementById('pdfLink');
        const btn1Week = document.getElementById('btn1Week');
        const btn1Month = document.getElementById('btn1Month');

        // アプリの状態管理
        let currentViewMode = 'week'; // 'week' または 'month'
        let currentScheduleData = null; // 取得したスケジュールを保持

        // 切り替えボタンのイベントリスナー
        btn1Week.addEventListener('click', () => {
            currentViewMode = 'week';
            updateToggleUI();
            if (currentScheduleData) renderSchedule(currentScheduleData);
        });

        btn1Month.addEventListener('click', () => {
            currentViewMode = 'month';
            updateToggleUI();
            if (currentScheduleData) renderSchedule(currentScheduleData);
        });

        // ボタンの見た目を更新する関数
        function updateToggleUI() {
            const activeClass = "flex-1 px-3 py-1.5 text-sm font-bold rounded-md bg-white text-emerald-700 shadow-sm transition-all duration-200".split(" ");
            const inactiveClass = "flex-1 px-3 py-1.5 text-sm font-bold rounded-md text-gray-500 hover:text-gray-800 transition-all duration-200".split(" ");
            
            if (currentViewMode === 'week') {
                btn1Week.className = activeClass.join(" ");
                btn1Month.className = inactiveClass.join(" ");
            } else {
                btn1Month.className = activeClass.join(" ");
                btn1Week.className = inactiveClass.join(" ");
            }
        }

        // 裏側で生成された目次（index.json）を自動取得してメニューを作る
        async function initApp() {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                    AREA_TOWN_MAP = { "太田エリア版 (モック)": ["飯田町"] };
                } else {
                    const res = await fetch('data/index.json');
                    if (!res.ok) throw new Error();
                    AREA_TOWN_MAP = await res.json();
                }

                areaSelect.innerHTML = '<option value="">-- 1. エリアを選択 --</option>';
                for (const area in AREA_TOWN_MAP) {
                    areaSelect.innerHTML += `<option value="${area}">${area}</option>`;
                }
                
                loading.classList.add('hidden');
                checkHash(); 
            } catch (e) {
                console.error(e);
                loading.textContent = "データを準備中です。GitHub Actionsの完了をお待ちください。";
            }
        }

        areaSelect.addEventListener('change', (e) => {
            const area = e.target.value;
            townSelect.innerHTML = '<option value="">-- 2. 町名を選択 --</option>';
            if (area && AREA_TOWN_MAP[area]) {
                AREA_TOWN_MAP[area].forEach(town => {
                    townSelect.innerHTML += `<option value="${town}">${town}</option>`;
                });
                townSelect.classList.remove('hidden');
            } else {
                townSelect.classList.add('hidden');
                resultArea.classList.add('hidden');
            }
        });

        townSelect.addEventListener('change', async (e) => {
            const town = e.target.value;
            if (!town) return resultArea.classList.add('hidden');
            
            window.location.hash = `town=${encodeURIComponent(town)}`;
            townTitle.textContent = town + " の予定";
            resultArea.classList.add('hidden');
            pdfLink.classList.add('hidden');
            loading.textContent = "カレンダーを読み込み中...";
            loading.classList.remove('hidden');

            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                    setTimeout(() => renderMock(), 800);
                    return;
                }
                
                const response = await fetch(`data/towns/${encodeURIComponent(town)}.json`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                // PDFURLが存在する場合はリンクを表示
                if (data.metadata && data.metadata.pdf_url) {
                    pdfLink.href = data.metadata.pdf_url;
                    pdfLink.classList.remove('hidden');
                }
                
                currentScheduleData = data.schedule; // データを保持
                renderSchedule(currentScheduleData);
            } catch (err) {
                renderMock();
            }
        });

        function renderMock() {
            const mockSchedule = {
                "5": { "M": [15,18,22,25,29], "P": [14,21,28], "S": [13,27], "N": [20] },
                "6": { "M": [1,5,8,12,15,19,22,26,29], "P": [4,11,18,25], "S": [10,24], "N": [3,17] }
            };
            pdfLink.href = "https://www.city.ota.gunma.jp/uploaded/attachment/38645.pdf";
            pdfLink.classList.remove('hidden');
            
            currentScheduleData = mockSchedule; // データを保持
            renderSchedule(currentScheduleData);
        }

        function renderSchedule(schedule) {
            scheduleList.innerHTML = '';
            let checkDate = new Date();
            checkDate.setHours(0, 0, 0, 0);
            let today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let daysAdded = 0;
            // モードに応じて表示する日数を変更（平日ベースでカウント）
            // 1週間分: 平日7日分(約10日間), 1か月分: 平日22日分(約1ヶ月間)
            const maxDays = currentViewMode === 'week' ? 7 : 22;

            while (daysAdded < maxDays) {
                const dayOfWeek = checkDate.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) { 
                    const month = (checkDate.getMonth() + 1).toString();
                    const date = checkDate.getDate();
                    const dayStr = ['日','月','火','水','木','金','土'][dayOfWeek];
                    
                    const diffDays = Math.round((checkDate.getTime() - today.getTime()) / (1000 * 3600 * 24));
                    let relativeHtml = "";
                    if (diffDays === 0) relativeHtml = `<span class="text-[10px] font-bold text-white bg-red-500 px-1.5 py-0.5 rounded mb-0.5 shadow-sm">今日</span>`;
                    else if (diffDays === 1) relativeHtml = `<span class="text-[10px] font-bold text-white bg-orange-500 px-1.5 py-0.5 rounded mb-0.5 shadow-sm">明日</span>`;
                    else if (diffDays === 2) relativeHtml = `<span class="text-[10px] font-bold text-emerald-700 border border-emerald-500 px-1.5 py-0.5 rounded mb-0.5 bg-emerald-50">明後日</span>`;

                    let garbages = [];
                    if (schedule && schedule[month]) {
                        for (const [code, dates] of Object.entries(schedule[month])) {
                            if (dates.includes(date)) garbages.push(code);
                        }
                    }

                    const bgClass = garbages.length > 0 ? "bg-white" : "bg-gray-50/50 text-gray-400";
                    
                    let content = garbages.length > 0 
                        ? garbages.map(c => `<span class="${GARBAGE_ICONS[c].color} font-bold text-sm bg-${GARBAGE_ICONS[c].color.split('-')[1]}-50 px-2 py-1 rounded border border-${GARBAGE_ICONS[c].color.split('-')[1]}-100 shadow-sm">${GARBAGE_ICONS[c].icon}${GARBAGE_ICONS[c].name}</span>`).join('<span class="mx-1"></span>')
                        : '<span class="text-sm">収集なし</span>';

                    scheduleList.innerHTML += `
                        <div class="flex items-center border-b border-gray-100 py-3 ${bgClass}">
                            <div class="w-[4.5rem] font-medium text-gray-700 flex flex-col items-center justify-center border-r border-gray-200 mr-3 pr-2">
                                ${relativeHtml}
                                <div class="flex items-baseline">
                                    <span class="text-xs text-gray-400">${month}/</span>
                                    <span class="text-xl font-bold">${date}</span>
                                </div>
                                <span class="text-xs text-gray-500 leading-none mt-0.5">(${dayStr})</span>
                            </div>
                            <div class="flex-1 flex flex-wrap gap-1">
                                ${content}
                            </div>
                        </div>`;
                    daysAdded++;
                }
                checkDate.setDate(checkDate.getDate() + 1);
            }
            loading.classList.add('hidden');
            resultArea.classList.remove('hidden');
        }

        function checkHash() {
            if (window.location.hash.startsWith('#town=')) {
                const savedTown = decodeURIComponent(window.location.hash.replace('#town=', ''));
                for (const [area, towns] of Object.entries(AREA_TOWN_MAP)) {
                    if (towns.includes(savedTown)) {
                        areaSelect.value = area;
                        areaSelect.dispatchEvent(new Event('change'));
                        townSelect.value = savedTown;
                        townSelect.dispatchEvent(new Event('change'));
                        break;
                    }
                }
            }
        }

        initApp();
    </script>
</body>
</html>
